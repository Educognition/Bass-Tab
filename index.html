<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Band Stage Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&family=Inter:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #ffffff;
            overflow: hidden; /* Prevent body scroll, manage scrolling in panels */
        }
        
        .tab-font {
            font-family: 'Fira Code', monospace;
            white-space: pre-wrap;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e1e1e; 
        }
        ::-webkit-scrollbar-thumb {
            background: #444; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #666; 
        }

        #tab-display-area {
            scroll-behavior: smooth;
        }

        .stage-view-active {
            background-color: #000 !important;
            padding: 2rem !important;
            font-size: 1.25rem;
        }
        
        #fullscreen-controls {
            transition: opacity 0.3s ease;
            opacity: 0;
            pointer-events: none;
        }
        
        .stage-view-active #fullscreen-controls {
            opacity: 1;
            pointer-events: auto;
        }
        
        @keyframes flashBeat {
            0% { background-color: #ef4444; }
            100% { background-color: transparent; }
        }
        .flash-active {
            animation: flashBeat 0.2s ease-out;
        }
    </style>
</head>
<body class="flex h-screen w-screen selection:bg-blue-500 selection:text-white">

    <aside class="w-80 bg-neutral-900 border-r border-neutral-800 flex flex-col z-20 h-full shadow-2xl relative">
        <div class="p-6 border-b border-neutral-800">
            <h1 class="text-2xl font-black tracking-tight text-white mb-2">STAGE<span class="text-blue-500">PRO</span></h1>
            <p class="text-sm text-neutral-400" id="status-message">Loading Setlist...</p>
        </div>

        <!-- Song List Container -->
        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="song-list">
            <!-- Populated via JS -->
        </div>

        <div class="p-4 border-t border-neutral-800 bg-neutral-950 space-y-6">
            
            <!-- Tuner Module -->
            <div class="bg-neutral-900 rounded-xl p-4 border border-neutral-800">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-wider">Reference Tuner</h3>
                    <div class="flex gap-2">
                        <button id="tuner-bass-btn" onclick="setTunerMode('bass')" class="text-xs px-2 py-1 rounded bg-blue-600 text-white font-bold">BASS</button>
                        <button id="tuner-guitar-btn" onclick="setTunerMode('guitar')" class="text-xs px-2 py-1 rounded bg-neutral-800 text-neutral-400 font-bold hover:bg-neutral-700">GUIT</button>
                    </div>
                </div>
                
                <div id="tuner-buttons" class="grid grid-cols-4 gap-2 mb-3">
                    <!-- Tuner buttons generated by JS -->
                </div>
                
                <label class="flex items-center space-x-2 cursor-pointer">
                    <input type="checkbox" id="octave-boost" class="rounded text-blue-500 focus:ring-blue-500 bg-neutral-800 border-neutral-700">
                    <span class="text-xs text-neutral-400">+1 Octave Boost (iPad Speakers)</span>
                </label>
            </div>

            <div class="bg-neutral-900 rounded-xl p-4 border border-neutral-800 relative" id="metronome-container">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-xs font-bold text-neutral-400 uppercase tracking-wider">Metronome</h3>
                    <span id="bpm-display" class="font-mono text-sm text-blue-400 font-bold">120 BPM</span>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleMetronome()" id="metro-play-btn" class="flex-1 bg-green-600 hover:bg-green-500 text-white font-bold py-2 rounded-lg transition-colors">PLAY</button>
                    <button onclick="tapTempo()" class="flex-1 bg-neutral-800 hover:bg-neutral-700 text-white font-bold py-2 rounded-lg transition-colors">TAP</button>
                </div>
            </div>

            <div>
                <label class="flex flex-col items-center justify-center w-full h-12 border-2 border-neutral-700 border-dashed rounded-lg cursor-pointer bg-neutral-800 hover:bg-neutral-700 transition-colors">
                    <div class="flex items-center justify-center space-x-2">
                        <svg class="w-4 h-4 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                        <span class="text-sm font-semibold text-neutral-300" id="upload-text">Upload songs.json</span>
                    </div>
                    <input type="file" class="hidden" accept=".json" onchange="handleFileUpload(event)" />
                </label>
            </div>

        </div>
    </aside>

    <main class="flex-1 flex flex-col bg-[#121212] relative">
        
        <!-- Top Toolbar (Instruments & View Controls) -->
        <header class="h-16 border-b border-neutral-800 bg-neutral-900/50 backdrop-blur flex items-center px-8 justify-between shrink-0">
            <div class="flex space-x-1 p-1 bg-neutral-900 rounded-lg border border-neutral-800" id="instrument-toggle">
                <!-- Instrument buttons populated by JS -->
            </div>
            
            <div class="flex items-center space-x-4">
                <button onclick="adjustFontSize(-2)" class="p-2 text-neutral-400 hover:text-white bg-neutral-800 rounded hover:bg-neutral-700">A-</button>
                <button onclick="adjustFontSize(2)" class="p-2 text-neutral-400 hover:text-white bg-neutral-800 rounded hover:bg-neutral-700">A+</button>
                <button onclick="enterStageView()" class="ml-4 px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded-lg transition-colors flex items-center shadow-[0_0_15px_rgba(37,99,235,0.3)]">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    STAGE VIEW
                </button>
            </div>
        </header>

        <div id="tab-container" class="flex-1 overflow-hidden relative bg-[#121212]">
            
            <!-- Floating Stage Controls (Hidden unless fullscreen) -->
            <div id="fullscreen-controls" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-neutral-900/90 backdrop-blur-md border border-neutral-700 p-4 rounded-2xl shadow-2xl flex items-center space-x-6 z-50">
                <button onclick="exitStageView()" class="text-neutral-400 hover:text-white px-3 py-2">Exit</button>
                <div class="w-px h-8 bg-neutral-700"></div>
                <button onclick="changeSpeed(-0.2)" class="text-neutral-300 hover:text-white font-bold text-xl">-</button>
                <div class="flex flex-col items-center min-w-[80px]">
                    <span class="text-xs text-neutral-400 uppercase tracking-widest mb-1">Scroll</span>
                    <span id="speed-display" class="font-mono font-bold text-blue-400">1.0x</span>
                </div>
                <button onclick="changeSpeed(0.2)" class="text-neutral-300 hover:text-white font-bold text-xl">+</button>
                <div class="w-px h-8 bg-neutral-700"></div>
                <button onclick="toggleAutoScroll()" id="play-pause-btn" class="bg-blue-600 hover:bg-blue-500 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-lg transition-transform hover:scale-105">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                </button>
            </div>

            <div id="tab-display-area" class="h-full overflow-y-auto p-8 pb-64">
                
                <!-- Song Header -->
                <div class="mb-8 border-b border-neutral-800 pb-6" id="song-header">
                    <h2 class="text-4xl font-black text-white tracking-tight mb-2" id="display-title">Select a Song</h2>
                    <h3 class="text-xl text-neutral-400 font-medium" id="display-artist">Upload your database or wait for auto-fetch</h3>
                    
                    <div class="flex flex-wrap gap-3 mt-6" id="metadata-badges">
                        <!-- Populated via JS -->
                    </div>
                </div>

                <!-- Guide/Notes Section -->
                <div id="guide-section" class="mb-8 bg-blue-900/10 border border-blue-900/30 p-4 rounded-xl hidden">
                    <h4 class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-2">Performance Guide</h4>
                    <p id="display-guide" class="text-sm text-blue-100/80 whitespace-pre-wrap font-mono"></p>
                </div>

                <div id="display-tab" class="tab-font text-lg leading-relaxed text-neutral-200">
                    <div class="text-center text-neutral-500 py-20">
                        <svg class="w-16 h-16 mx-auto mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
                        <p>Waiting for setlist data...</p>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        let database = [];
        let currentSong = null;
        let currentInstrument = 'bass';
        const instruments = [
            { id: 'bass', label: 'Bass' },
            { id: 'drums', label: 'Drums' },
            { id: 'vocals', label: 'Vocals' },
            { id: 'rhythm', label: 'Rhythm' },
            { id: 'lead', label: 'Lead' }
        ];
        
        let fontSize = 18;
        let scrollSpeed = 1.0;
        let isAutoScrolling = false;
        let scrollInterval;
        let isFullscreen = false;

        document.addEventListener('DOMContentLoaded', () => {
            renderInstrumentToggle();
            setupTuner();
            
            document.getElementById('status-message').innerHTML = '<span class="text-blue-400">Fetching songs.json...</span>';
            
            // Auto-fetch data (works when hosted on GitHub or a server)
            fetch('songs.json')
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    database = data;
                    document.getElementById('status-message').innerHTML = `<span class="text-green-400">Loaded ${data.length} songs.</span>`;
                    renderSidebar();
                    if(data.length > 0) selectSong(data[0].id);
                })
                .catch(error => {
                    console.warn('Auto-fetch failed (expected if running locally from file://):', error);
                    document.getElementById('status-message').innerHTML = '<span class="text-amber-500">Local mode. Please upload file.</span>';
                });
        });

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    database = data;
                    document.getElementById('upload-text').innerText = file.name;
                    document.getElementById('status-message').innerHTML = `<span class="text-green-400">Uploaded ${data.length} songs.</span>`;
                    renderSidebar();
                    if(data.length > 0) selectSong(data[0].id);
                } catch (error) {
                    document.getElementById('status-message').innerHTML = '<span class="text-red-500 font-bold">Invalid JSON Format!</span>';
                }
            };
            reader.readAsText(file);
        }

        function renderSidebar() {
            const list = document.getElementById('song-list');
            list.innerHTML = '';
            
            database.forEach(song => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-3 rounded-lg border transition-all ${
                    currentSong && currentSong.id === song.id 
                    ? 'bg-blue-600/20 border-blue-500/50 text-white' 
                    : 'bg-neutral-800/50 border-transparent text-neutral-400 hover:bg-neutral-800 hover:text-neutral-200'
                }`;
                btn.onclick = () => selectSong(song.id);
                btn.innerHTML = `
                    <div class="font-bold truncate">${song.title}</div>
                    <div class="text-xs opacity-70 truncate">${song.artist}</div>
                `;
                list.appendChild(btn);
            });
        }

        function renderInstrumentToggle() {
            const container = document.getElementById('instrument-toggle');
            container.innerHTML = '';
            instruments.forEach(inst => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 text-sm font-bold rounded-md transition-colors ${
                    currentInstrument === inst.id 
                    ? 'bg-neutral-700 text-white shadow' 
                    : 'text-neutral-400 hover:text-white hover:bg-neutral-800/50'
                }`;
                btn.innerText = inst.label;
                btn.onclick = () => {
                    currentInstrument = inst.id;
                    renderInstrumentToggle();
                    updateDisplay();
                };
                container.appendChild(btn);
            });
        }

        function selectSong(id) {
            currentSong = database.find(s => s.id === id);
            scrollSpeed = currentSong.defaultScrollSpeed || 1.0;
            updateSpeedDisplay();
            renderSidebar();
            updateDisplay();
            
            // Reset scroll and play state
            if(isAutoScrolling) toggleAutoScroll();
            document.getElementById('tab-display-area').scrollTop = 0;
            
            // Sync Metronome
            targetBpm = currentSong.tempo || 120;
            document.getElementById('bpm-display').innerText = `${targetBpm} BPM`;
            if (isMetroPlaying) {
                toggleMetronome(); // stop it
                toggleMetronome(); // restart at new tempo
            }
        }

        function updateDisplay() {
            if (!currentSong) return;

            document.getElementById('display-title').innerText = currentSong.title;
            document.getElementById('display-artist').innerText = currentSong.artist;
            
            const partData = currentSong.parts[currentInstrument];
            
            // Metadata Badges
            let badgesHTML = `
                <span class="px-3 py-1 bg-neutral-800 text-neutral-300 rounded-full text-xs font-bold border border-neutral-700">Key: ${currentSong.key || 'N/A'}</span>
                <span class="px-3 py-1 bg-neutral-800 text-neutral-300 rounded-full text-xs font-bold border border-neutral-700">Tempo: ${currentSong.tempo || 'N/A'} BPM</span>
            `;
            
            if (partData && partData.difficulty) {
                let colorClass = "text-green-400 border-green-900 bg-green-900/20";
                if(partData.difficulty === "Medium") colorClass = "text-amber-400 border-amber-900 bg-amber-900/20";
                if(partData.difficulty === "Hard") colorClass = "text-red-400 border-red-900 bg-red-900/20";
                
                badgesHTML += `<span class="px-3 py-1 rounded-full text-xs font-bold border ${colorClass}">${partData.difficulty}</span>`;
            }
            document.getElementById('metadata-badges').innerHTML = badgesHTML;

            // Guide
            const guideSec = document.getElementById('guide-section');
            if (partData && partData.guide) {
                document.getElementById('display-guide').innerText = partData.guide;
                guideSec.classList.remove('hidden');
            } else {
                guideSec.classList.add('hidden');
            }

            // Tab Content with Syntax Highlighting
            const tabContainer = document.getElementById('display-tab');
            if (partData && partData.tab) {
                // Highlight structural brackets like [Intro], [Verse]
                let highlightedTab = partData.tab.replace(/(\[.*?\])/g, '<span class="text-blue-400 font-bold">$1</span>');
                tabContainer.innerHTML = highlightedTab;
            } else {
                tabContainer.innerHTML = `<div class="text-neutral-500 italic py-10">No ${instruments.find(i=>i.id===currentInstrument).label} chart available for this song.</div>`;
            }
        }

        function adjustFontSize(delta) {
            fontSize = Math.max(12, Math.min(48, fontSize + delta));
            document.getElementById('display-tab').style.fontSize = `${fontSize}px`;
        }

        function changeSpeed(delta) {
            scrollSpeed = Math.max(0.2, Math.min(5.0, Number((scrollSpeed + delta).toFixed(1))));
            updateSpeedDisplay();
        }

        function updateSpeedDisplay() {
            document.getElementById('speed-display').innerText = `${scrollSpeed.toFixed(1)}x`;
        }

        function toggleAutoScroll() {
            isAutoScrolling = !isAutoScrolling;
            const btn = document.getElementById('play-pause-btn');
            
            if (isAutoScrolling) {
                btn.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>`;
                btn.classList.replace('bg-blue-600', 'bg-amber-600');
                btn.classList.replace('hover:bg-blue-500', 'hover:bg-amber-500');
                
                scrollInterval = setInterval(() => {
                    document.getElementById('tab-display-area').scrollBy(0, scrollSpeed);
                }, 50);
            } else {
                btn.innerHTML = `<svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>`;
                btn.classList.replace('bg-amber-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-amber-500', 'hover:bg-blue-500');
                clearInterval(scrollInterval);
            }
        }

        const tabContainer = document.getElementById('tab-container');
        const displayArea = document.getElementById('tab-display-area');

        function enterStageView() {
            if (tabContainer.requestFullscreen) {
                tabContainer.requestFullscreen().catch(err => console.error("Error attempting to enable fullscreen:", err));
            } else if (tabContainer.webkitRequestFullscreen) { /* Safari */
                tabContainer.webkitRequestFullscreen();
            }
        }

        function exitStageView() {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) { /* Safari */
                document.webkitExitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

        function handleFullscreenChange() {
            isFullscreen = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (isFullscreen) {
                displayArea.classList.add('stage-view-active');
            } else {
                displayArea.classList.remove('stage-view-active');
            }
        }

        let audioCtx;
        let activeOscillator = null;
        let tunerMode = 'bass';
        
        const tunings = {
            bass: [
                { note: 'E', freq: 41.20 },
                { note: 'A', freq: 55.00 },
                { note: 'D', freq: 73.42 },
                { note: 'G', freq: 98.00 }
            ],
            guitar: [
                { note: 'E', freq: 82.41 },
                { note: 'A', freq: 110.00 },
                { note: 'D', freq: 146.83 },
                { note: 'G', freq: 196.00 },
                { note: 'B', freq: 246.94 },
                { note: 'e', freq: 329.63 }
            ]
        };

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function setTunerMode(mode) {
            tunerMode = mode;
            document.getElementById('tuner-bass-btn').className = `text-xs px-2 py-1 rounded font-bold ${mode === 'bass' ? 'bg-blue-600 text-white' : 'bg-neutral-800 text-neutral-400 hover:bg-neutral-700'}`;
            document.getElementById('tuner-guitar-btn').className = `text-xs px-2 py-1 rounded font-bold ${mode === 'guitar' ? 'bg-blue-600 text-white' : 'bg-neutral-800 text-neutral-400 hover:bg-neutral-700'}`;
            setupTuner();
        }

        function setupTuner() {
            const container = document.getElementById('tuner-buttons');
            container.innerHTML = '';
            
            // Adjust grid columns based on mode
            container.className = `grid gap-2 mb-3 ${tunerMode === 'bass' ? 'grid-cols-4' : 'grid-cols-3'}`;
            
            tunings[tunerMode].forEach(string => {
                const btn = document.createElement('button');
                btn.className = "py-3 bg-neutral-800 hover:bg-blue-900 hover:text-blue-300 text-neutral-300 font-bold rounded text-sm transition-colors border border-neutral-700";
                btn.innerText = string.note;
                
                // Mouse/Touch events for play
                btn.onmousedown = () => playTone(string.freq);
                btn.ontouchstart = (e) => { e.preventDefault(); playTone(string.freq); };
                
                btn.onmouseup = stopTone;
                btn.onmouseleave = stopTone;
                btn.ontouchend = stopTone;
                btn.ontouchcancel = stopTone;

                container.appendChild(btn);
            });
        }

        function playTone(frequency) {
            initAudio();
            stopTone(); // ensure only one plays
            
            const isBoosted = document.getElementById('octave-boost').checked;
            const finalFreq = isBoosted ? frequency * 2 : frequency;

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            // Triangle wave cuts through mix/speakers better than sine
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(finalFreq, audioCtx.currentTime);
            
            // Envelope to prevent clipping clicks
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);

            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            activeOscillator = { osc, gainNode };
        }

        function stopTone() {
            if (activeOscillator) {
                const { osc, gainNode } = activeOscillator;
                gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                osc.stop(audioCtx.currentTime + 0.1);
                activeOscillator = null;
            }
        }

        let isMetroPlaying = false;
        let metroInterval;
        let nextNoteTime = 0.0;
        let current16thNote = 0;
        let lookahead = 25.0; // ms
        let scheduleAheadTime = 0.1; // s
        let targetBpm = 120;
        
        let tapTimes = [];

        function toggleMetronome() {
            initAudio();
            isMetroPlaying = !isMetroPlaying;
            const btn = document.getElementById('metro-play-btn');
            
            if (isMetroPlaying) {
                btn.innerText = "STOP";
                btn.classList.replace('bg-green-600', 'bg-red-600');
                btn.classList.replace('hover:bg-green-500', 'hover:bg-red-500');
                
                current16thNote = 0;
                nextNoteTime = audioCtx.currentTime + 0.05;
                scheduler();
            } else {
                btn.innerText = "PLAY";
                btn.classList.replace('bg-red-600', 'bg-green-600');
                btn.classList.replace('hover:bg-red-500', 'hover:bg-green-500');
                clearTimeout(metroInterval);
            }
        }

        function nextNote() {
            const secondsPerBeat = 60.0 / targetBpm;
            nextNoteTime += secondsPerBeat;
            current16thNote++;
            if (current16thNote === 4) {
                current16thNote = 0;
            }
        }

        function scheduleNote(beatNumber, time) {
            // Visual Flash
            requestAnimationFrame(() => {
                const container = document.getElementById('metronome-container');
                container.classList.remove('flash-active');
                void container.offsetWidth; // trigger reflow
                if (beatNumber === 0) {
                    container.classList.add('flash-active');
                }
            });

            // Audio Beep
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            // Higher pitch on beat 1
            if (beatNumber === 0) osc.frequency.value = 880.0;
            else osc.frequency.value = 440.0;

            gainNode.gain.setValueAtTime(0, time);
            gainNode.gain.linearRampToValueAtTime(0.8, time + 0.01);
            gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

            osc.start(time);
            osc.stop(time + 0.1);
        }

        function scheduler() {
            while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
                scheduleNote(current16thNote, nextNoteTime);
                nextNote();
            }
            metroInterval = setTimeout(scheduler, lookahead);
        }

        function tapTempo() {
            const now = Date.now();
            tapTimes.push(now);
            
            if (tapTimes.length > 4) {
                tapTimes.shift();
            }
            
            if (tapTimes.length >= 2) {
                let sum = 0;
                for (let i = 1; i < tapTimes.length; i++) {
                    sum += tapTimes[i] - tapTimes[i-1];
                }
                const avgInterval = sum / (tapTimes.length - 1);
                targetBpm = Math.round(60000 / avgInterval);
                document.getElementById('bpm-display').innerText = `${targetBpm} BPM`;
            }
        }

    </script>
</body>
